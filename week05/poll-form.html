<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Form</title>
    <link rel="stylesheet" href="styles/poll_form.css">
</head>

<body>
    <header>
        <h1>WWD 130 | HTML Form - User Poll</h1>
    </header>
    <main>
        <form>
            <fieldset>
                <legend>Contact Information</legend>
                <div class="form-item column2"><label for="fullname">Fullname:</label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>
                <div class="form-item column2"><label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" required>
                </div>
            </fieldset>
            <fieldset>
                <legend>Questions</legend>
                <div class="form-item column1"><label for="quantity">What is your favorite
                        browser?</label>
                    <select name="quantity" id="quantity">
                        <option value="1">Chrome</option>
                        <option value="2">Safari</option>
                        <option value="3">Edge</option>
                        <option value="4">Brave</option>
                        <option value="5">Other</option>
                    </select>
                </div>
                <div class="form-item"><label>Do you have a pet? <input type="checkbox" id="pet"
                          name="pet"></label></div>
                <div class="form-item">List the places you have lived:<textarea id="feedback"
                      name="feedback" rows="5"
                      placeholder="For example: I live in Paris and Washington DC."></textarea>
            </fieldset>
            <br>
            <button type="submit">Submit poll</button>
            </div>
        </form>
    </main>
    <footer>
        <p>&copy;2026 | HTML Form - User Poll Activity | Proud Bhebhe</p>
    </footer>

</body>

</html>
