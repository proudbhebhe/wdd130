<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <meta name="description"
      content="Planning a trip? Do you have any feedback? Want to see us improve? Reach out to us and let us know how we can help. We are always on call 24/7.">
    <meta name="author" content="Proud Bhebhe">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header class="grid">
        <img src="images/therapidssplash.jpg" alt="The rapid splash logo">
        <nav class="fame">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main class="page-layout contact-main">
        <section class="company-header">
            <h1>The Rapids Splash</h1>
            <p>Bastasi bb, Foca 73300</p>
            <p>Bosnia & Herzegovina</p>
            <p>+263 78 787 7878</p>
            <p><a href="mailto:therapidssplash100@gmai.com">therapidssplash100@gmail.com</a></p>
        </section>

        <div class="content-split">
            <section class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2209.2790264068203!2d18.793282274927073!3d43.36893517077178!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x134cd5f1df4e20f3%3A0x1bb887a729f33b87!2sRafting%20Centar%20Drina-Tara!5e1!3m2!1sen!2szw!4v1781032585018!5m2!1sen!2szw"
                  width="600" height="450" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </section>

            <section class="form-container">
                <form action="#" method="post" class="contact-form">
                    <div class="two">
                        <label for="fullname">Name</label>
                        <input type="text" id="fullname" name="fullname" required
                          placeholder="Joseph Smith Jr">
                    </div>
                    <div class="two">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required
                          placeholder="example@gmail.com">
                    </div>
                    <div class="two radio">
                        <label>Message Purpose</label>
                        <div>
                            <input type="radio" id="general" name="purpose" value="general">
                            <label for="general">General Inquiry</label>
                            <input type="radio" id="reservation" name="purpose"
                              value="reservation questions">
                            <label for="reservation">Reservation Questions</label>
                            <input type="radio" id="website" name="purpose" value="website">
                            <label for="website">Website Suggestions</label>
                        </div>
                    </div>
                    <div class="two top">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="4"
                          placeholder="Type Here"></textarea>
                    </div>
                    <div class="two checkbox">
                        <input type="checkbox" id="newsletter" name="newsletter"><label
                          for="newsletter">Please subscribe me
                            to the monthly newsletter</label>
                    </div>
                    <button type="submit" class="submit-btn">Get in Touch!</button>
                </form>
            </section>
        </div>
        <section class="raft">
            <h2>We Are Here To Serve To You</h2>

            <figure><img src="images/alexandar_reime.jpg" alt="Alexander Reime image">
                <figcaption>Alexander Reime.</figcaption>
            </figure>


            <figure><img src="images/sanket_mishra.jpg" alt="Sanket Mishra image">
                <figcaption>Sanket Mishra.</figcaption>
            </figure>


            <figure><img src="images/patience_chivu.jpg" alt="Patience Chivu image">
                <figcaption>Patience Chivu.</figcaption>
            </figure>

        </section>
        <footer>
            <p>&copy;| 2026| The Rapids Splash| Proud Bhebhe</p>
            <nav class="socialmedia">
                <a href="https://facebook.com"><img src="images/facebook_icon.svg"
                      alt="Facebook logo"></a>
                <a href="https://instagram.com"><img src="images/instagram_icon.svg"
                      alt="Instagram logo"> </a>
                <a href="https://linkedin.com"><img src="images/linkedin_icon.svg"
                      alt="LinkedIn Icon">
                </a>

            </nav>
        </footer>
    </main>

</body>

</html>
